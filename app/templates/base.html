<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>任務管理系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .nav {
            margin-bottom: 20px;
        }
        .nav a {
            margin-right: 10px;
            text-decoration: none;
            color: #0066cc;
        }
        .task {
            background: white;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
        }
        .completed {
            color: gray;
            text-decoration: line-through;
        }
        button, input[type='submit'] {
            margin-right: 6px;
            padding: 6px 10px;
            cursor: pointer;
        }
        input, textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('tasks.index') }}">首頁</a>
        <a href="{{ url_for('tasks.create_task') }}">新增任務</a>
    </div>

    {% block content %}{% endblock %}
</body>
</html>
